<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/Components/Images/logo-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function (l) {
      if (l.search.startsWith("?/")) {
        const decoded = l.search.slice(2);
        window.history.replaceState(
          null,
          null,
          "/" + decoded + l.hash
        );
      }
    })(window.location);
  </script>

  <title>VNS Electronics | Elektronika məhsullarının topdan və pərakəndə satışı</title>
</head>

<body>
  <!-- <div id="root"></div> -->
  <div class="maintenance-wrapper">
    <div class="maintenance-card">
      <div class="maintenance-badge">VNS Electronics</div>
      <h1>Texniki narahatlığa görə üzr istəyirik</h1>
      <p>
        Saytımızda hazırda müvəqqəti texniki problem yaranıb. Komandamız problemi
        aradan qaldırmaq üçün çalışır.
      </p>
      <p>
        Sifariş və məhsullarla bağlı bizimlə Instagram üzərindən əlaqə saxlaya
        bilərsiniz.
      </p>

      <a class="maintenance-btn" href="https://www.instagram.com/vns_electronicss/" target="_blank"
        rel="noopener noreferrer">
        Instagram-da davam et
      </a>
    </div>
  </div>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #eef2ff);
      min-height: 100vh;
    }

    .maintenance-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .maintenance-card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .maintenance-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .maintenance-card h1 {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.3;
      color: #111827;
    }

    .maintenance-card p {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.7;
      color: #4b5563;
    }

    .maintenance-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
      padding: 14px 22px;
      border-radius: 14px;
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .maintenance-btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    @media (max-width: 600px) {
      .maintenance-card {
        padding: 26px 18px;
        border-radius: 20px;
      }

      .maintenance-card h1 {
        font-size: 23px;
      }

      .maintenance-card p {
        font-size: 14px;
      }

      .maintenance-btn {
        width: 100%;
      }
    }
  </style>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
